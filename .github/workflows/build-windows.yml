name: Build Windows EXE

# Builds a standalone ProxyTester app (no Python needed) as a PyInstaller
# **onedir** bundle, zips it, and publishes the zip as a GitHub Release.
# onedir avoids runtime DLL unpacking, so self-updates never race antivirus.
# On a push to main the release tag is read from APP_VERSION in the source; a
# v* tag or manual run can override it.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.7); blank = use VERSION file"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller certifi

      - name: Build standalone app (onedir)
        run: pyinstaller --onedir --windowed --name ProxyTester --icon logo.ico --collect-all certifi proxy_tester.py

      - name: Zip the app folder
        shell: pwsh
        run: Compress-Archive -Path dist/ProxyTester -DestinationPath dist/ProxyTester-windows.zip -Force

      - name: Determine release tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            v=$(python -c "import re;print(re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('proxy_tester.py').read()).group(1))")
            echo "tag=v$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyTester-windows
          path: dist/ProxyTester-windows.zip

      - name: Publish app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ProxyTester ${{ steps.ver.outputs.tag }}
          body: |
            ProxyTester ${{ steps.ver.outputs.tag }}

            Download **ProxyTester-windows.zip**, extract it, and run
            ProxyTester.exe. Existing installs can update from inside the
            app via the settings menu (Check for updates).
          files: dist/ProxyTester-windows.zip
