name: Build Windows EXE

# Produces a standalone ProxyTester.exe that runs on Windows with NO Python installed.
# Runs on every push to main and can be triggered manually.
# A manual run (or a v* tag) also publishes the .exe to a GitHub Release.

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag/version to publish the .exe under (e.g. v1.0)"
        required: false
        default: "v1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build standalone EXE
        run: pyinstaller --onefile --windowed --name ProxyTester proxy_tester.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyTester-windows
          path: dist/ProxyTester.exe

      - name: Publish EXE to release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ProxyTester.exe

      - name: Publish EXE to release (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ProxyTester ${{ github.event.inputs.release_tag }}
          files: dist/ProxyTester.exe
