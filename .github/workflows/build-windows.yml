name: Build Windows EXE

# Builds a standalone ProxyTester.exe (no Python needed) and publishes it as a
# GitHub Release. On a push to main the release version is read from the VERSION
# file (tag v<VERSION>); a v* tag or manual run can override it.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.7); blank = use VERSION file"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build standalone EXE
        run: pyinstaller --onefile --windowed --name ProxyTester proxy_tester.py

      - name: Determine release tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyTester-windows
          path: dist/ProxyTester.exe

      - name: Publish EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ProxyTester ${{ steps.ver.outputs.tag }}
          files: dist/ProxyTester.exe
